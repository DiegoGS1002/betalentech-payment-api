version: '3.8'

services:

  app:
    image: webdevops/php-apache:8.4
    container_name: betalentech_app
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "8000:80"
    environment:
      - WEB_DOCUMENT_ROOT=/app/public
    command:
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    container_name: betalentech_mysql
    restart: always
    environment:
      MYSQL_DATABASE: betalentech
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  gateway1:
    image: matheusprotzen/gateways-mock
    container_name: gateway1
    ports:
      - "3001:3001"
    environment:
      REMOVE_AUTH: "true"

  gateway2:
    image: matheusprotzen/gateways-mock
    container_name: gateway2
    ports:
      - "3002:3002"
    environment:
      REMOVE_AUTH: "true"

volumes:
  mysql_data:
